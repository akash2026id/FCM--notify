<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FCM Test - ChatCity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f0f0f;
      color: #fff;
      padding-top: 100px;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background: #00ffcc;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 15px #00ffcc;
    }
  </style>
</head>

<body>

  <h1>🔔 FCM Notification Test</h1>
  <p>Click button to enable notification</p>

  <button onclick="startFCM()">Enable Notification</button>
  <div id="status"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAVKGyPWWQzEWfwkOwhwXabD3HbuLQz-qA",
      authDomain: "chatcity-63c68.firebaseapp.com",
      projectId: "chatcity-63c68",
      storageBucket: "chatcity-63c68.firebasestorage.app",
      messagingSenderId: "1015529457316",
      appId: "1:1015529457316:web:638f1d8e25539177844831"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    // 🔔 Start FCM
    window.startFCM = async function () {
      try {
        const permission = await Notification.requestPermission();

        if (permission === "granted") {
          // Ensure service worker is ready
          const registration = await navigator.serviceWorker.ready;
          
          const token = await getToken(messaging, {
            vapidKey: "BIzNCrJpsUisn0Jqa6ETjkMUgt5LvXUKn6BtCrTgbzGfwtEXRPS1u06T-1a4mn6djVlkZjLrio5lcsEpOfKKlIo",
            serviceWorkerRegistration: registration
          });

          console.log("FCM TOKEN:", token);
          document.getElementById('status').innerHTML = '✅ Token Generated!<br>' + token;
          alert("✅ Token Generated! Check Console");

        } else {
          alert("❌ Permission Denied");
        }
      } catch (e) {
        console.error("Error:", e);
        document.getElementById('status').innerHTML = '❌ Error: ' + e.message;
        alert("Error: " + e.message);
      }
    };

    // 📩 Foreground message
    onMessage(messaging, (payload) => {
      console.log("Message received:", payload);
      alert("🔔 " + payload.notification.title + "\n" + payload.notification.body);
    });

    // 🛠 Register service worker - Use EXACT path for GitHub Pages
    if ('serviceWorker' in navigator) {
      // Get current path
      const basePath = window.location.pathname;
      console.log("Base path:", basePath);
      
      // Register with explicit path
      navigator.serviceWorker.register(basePath + 'firebase-messaging-sw.js')
        .then((reg) => {
          console.log("✅ Service Worker Registered:", reg.scope);
        })
        .catch((err) => {
          console.error("❌ Service Worker registration failed:", err);
          document.getElementById('status').innerHTML = '❌ SW Error: ' + err.message;
        });
    }
  </script>

</body>
</html>
